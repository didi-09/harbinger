# attacks/catalog.yaml — Real-attack dataset catalog  (#1, #15)
#
# Each entry describes one adversarial session to run against a live honeypot
# container using the real attack tool installed on Kali Linux. Sessions are
# driven by attacks/run_attacks.py which:
#   1. Deploys the honeypot with a dynamic port (--blueprint <target_blueprint>)
#   2. Runs the tool command against the allocated port
#   3. Polls logs and triggers behavior switches via the policy engine
#   4. Generates a report and stops the container
#   5. Records results to attack_logs/ground_truth.json and results/dataset_manifest.csv
#
# Field reference:
#   id:                 unique run identifier → session hp_<id>
#   category:           attack category for paper table grouping
#   tool:               binary on PATH used to generate traffic
#   target_blueprint:   honeypot blueprint to deploy
#   port_key:           "ssh" | "web" — which host_port to substitute into command
#   command:            shell command template; {host} → localhost, {port} → allocated port
#                       {wordlist} → /usr/share/wordlists/rockyou.txt
#                       {dirlist}  → /usr/share/wordlists/dirb/common.txt
#                       {smalllist}→ attacks/wordlists/top100_passwords.txt  (generated)
#   expected_blueprint: what classify should produce
#   expected_modes:     list of modes the agent is expected to switch to
#   timeout_s:          max seconds to let the tool run before kill
#   notes:              brief description

